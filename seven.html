<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Query Form - Debug</title>

    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Oswald:wght@400;700&display=swap');

        /* CSS Variables - Dark & Premium Theme */
        :root {
            --primary-color: #bb86fc; /* Light Purple */
            --secondary-color: #03dac6; /* Teal */
            --accent-color: #3700b3; /* Deep Purple */
            --background-dark: #121212; /* Very Dark Grey */
            --surface-color: #1e1e1e; /* Slightly Lighter Dark Grey */
            --text-color-primary: #e0e0e0; /* Light Grey */
            --text-color-secondary: #a0a0a0; /* Medium Grey */
            --border-color-light: #424242;
            --border-color-focus: var(--primary-color);
            --error-color: #cf6679; /* Red-ish */
            --success-color: #03dac6; /* Teal for success */
            --shadow-color: rgba(0, 0, 0, 0.3);
            --transition-speed-fast: 0.2s;
            --transition-speed-medium: 0.3s;
            --transition-speed-slow: 0.5s;
            --border-radius-soft: 12px;
            --input-height: 55px;
            --label-move-distance: -28px;
        }

        /* Global Styles */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background-dark);
            color: var(--text-color-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        /* Form Container */
        .form-premium-container {
            background-color: var(--surface-color);
            padding: 50px 60px;
            border-radius: var(--border-radius-soft);
            box-shadow: 0 20px 40px var(--shadow-color), 0 10px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 650px;
            animation: slideFadeIn 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        @keyframes slideFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-premium-container h2 {
            font-family: 'Oswald', sans-serif;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 3em;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-premium-container p {
            color: var(--text-color-secondary);
            font-size: 1.05em;
            line-height: 1.7;
            text-align: center;
            margin-bottom: 40px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Form Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px 20px; /* Row gap, Column gap */
            margin-bottom: 30px;
        }

        .form-grid .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            margin-bottom: 0;
        }

        .form-group label {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            color: var(--text-color-secondary);
            pointer-events: none;
            transition: all var(--transition-speed-medium) cubic-bezier(0.68, -0.55, 0.27, 1.55);
            font-weight: 500;
            font-size: 1em;
            z-index: 2;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 20px 15px;
            border: 1px solid var(--border-color-light);
            border-radius: var(--border-radius-soft);
            background-color: var(--surface-color);
            font-size: 1em;
            color: var(--text-color-primary);
            height: var(--input-height);
            box-sizing: border-box;
            transition: border-color var(--transition-speed-medium) ease,
                        box-shadow var(--transition-speed-medium) ease,
                        background-color var(--transition-speed-medium) ease,
                        transform var(--transition-speed-fast) ease;
            position: relative;
            z-index: 1;
        }

        .form-group textarea {
            min-height: 180px;
            padding-top: 60px;
            padding-bottom: 20px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group input:not(:placeholder-shown),
        .form-group textarea:not(:placeholder-shown) {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 5px rgba(187, 134, 252, 0.3);
            background-color: var(--surface-color);
            transform: translateY(-2px);
        }

        .form-group input:focus + label,
        .form-group textarea:focus + label,
        .form-group input:not(:placeholder-shown) + label,
        .form-group textarea:not(:placeholder-shown) + label {
            top: var(--label-move-distance);
            left: 15px;
            transform: translateY(0);
            font-size: 0.7em;
            color: var(--primary-color);
            background-color: var(--surface-color);
            padding: 0 8px;
            font-weight: 600;
            z-index: 3;
            letter-spacing: 0.5px;
        }

        .form-group .message-container {
            min-height: 25px;
            font-size: 0.85em;
            margin-top: 8px;
            text-align: left;
            transition: color var(--transition-speed-medium) ease;
            position: relative;
            padding-left: 5px;
        }

        .form-group .message-container.error {
            color: var(--error-color);
        }
        .form-group .message-container.success {
            color: var(--success-color);
            font-weight: 500;
        }

        .form-group input.is-invalid,
        .form-group textarea.is-invalid {
            border-color: var(--error-color);
            box-shadow: 0 0 0 5px rgba(207, 102, 121, 0.3);
        }
        .form-group input.is-invalid + label,
        .form-group textarea.is-invalid + label {
            color: var(--error-color);
        }

        .form-group input.is-valid,
        .form-group textarea.is-valid {
            border-color: var(--success-color);
            box-shadow: 0 0 0 5px rgba(3, 214, 198, 0.3);
        }
        .form-group input.is-valid + label,
        .form-group textarea.is-valid + label {
            color: var(--success-color);
        }

        .submit-btn {
            grid-column: 1 / -1;
            background: linear-gradient(45deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: var(--background-dark);
            padding: 18px 35px;
            border: none;
            border-radius: var(--border-radius-soft);
            font-size: 1.25em;
            font-weight: 700;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all var(--transition-speed-medium) cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 10px 25px rgba(3, 214, 198, 0.3), 0 5px 15px rgba(187, 134, 252, 0.3);
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .submit-btn::before {
            content: 'Submit Now';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity var(--transition-speed-medium) ease;
            border-radius: var(--border-radius-soft);
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(3, 214, 198, 0.4), 0 8px 20px rgba(187, 134, 252, 0.4);
        }
        .submit-btn:hover::before {
            opacity: 1;
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(3, 214, 198, 0.3), 0 3px 10px rgba(187, 134, 252, 0.3);
        }

        .success-message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 1.8em;
            z-index: 1000;
            animation: zoomIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
            transform: scale(0.9);
            text-align: center;
            font-family: 'Oswald', sans-serif;
        }

        .success-message-overlay p:first-child {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .success-message-overlay p:last-child {
            font-size: 1.1em;
            color: var(--text-color-secondary);
        }

        @keyframes zoomIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .form-premium-container {
                padding: 40px 40px;
            }
            .form-premium-container h2 {
                font-size: 2.5em;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .form-group input[type="text"],
            .form-group input[type="email"],
            .form-group textarea {
                height: 50px;
            }
            .form-group textarea {
                min-height: 150px;
                padding-top: 50px;
            }
            .submit-btn {
                font-size: 1.1em;
            }
        }

        /* Accessibility: High contrast focus outline */
        input:focus, textarea:focus {
            outline: 3px solid var(--primary-color);
            outline-offset: 3px;
        }
    </style>
</head>
<body>

    <div class="form-premium-container">
        <h2>Get In Touch</h2>
        <p>Reach out to us. We're here to assist and discuss your needs.</p>

        <form id="premiumQueryForm">
            <div class="form-grid">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder=" " required aria-required="true">
                    <label for="name">Your Name</label>
                    <div class="message-container"></div>
                </div>

                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder=" " required aria-required="true">
                    <label for="email">Your Email</label>
                    <div class="message-container"></div>
                </div>

                <div class="form-group full-width">
                    <input type="text" id="subject" name="subject" placeholder=" " required aria-required="true">
                    <label for="subject">Subject</label>
                    <div class="message-container"></div>
                </div>

                <div class="form-group full-width">
                    <textarea id="message" name="message" placeholder=" " required aria-required="true"></textarea>
                    <label for="message">Your Message</label>
                    <div class="message-container"></div>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </div>
        </form>
    </div>

    <div class="success-message-overlay" id="successOverlay">
        <p>Message Sent</p>
        <p>Thank you! We've received your inquiry and will respond shortly.</p>
    </div>

    <script>
        // --- Debugging Flags ---
        const DEBUG_MODE = true; // Set to false to disable console logs

        function log(message, type = 'info') {
            if (DEBUG_MODE) {
                if (type === 'error') console.error(message);
                else if (type === 'warn') console.warn(message);
                else console.log(message);
            }
        }

        // Wrap everything in DOMContentLoaded to ensure HTML is parsed
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM fully loaded and parsed.');

            const form = document.getElementById('premiumQueryForm');
            if (!form) {
                log('Error: Form element with ID "premiumQueryForm" not found.', 'error');
                return; // Stop execution if form is not found
            }

            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const subjectInput = document.getElementById('subject');
            const messageInput = document.getElementById('message');
            const successOverlay = document.getElementById('successOverlay');

            if (!successOverlay) {
                 log('Warning: Success overlay element not found. Success message might not display.', 'warn');
            }

            // --- Validation Rules Object ---
            const validationRules = {
                name: {
                    required: true,
                    minLength: 3,
                    maxLength: 50,
                    errorMessage: {
                        required: 'Name is mandatory.',
                        minLength: 'Name must be at least 3 characters.',
                        maxLength: 'Name cannot exceed 50 characters.'
                    }
                },
                email: {
                    required: true,
                    isEmail: true,
                    errorMessage: {
                        required: 'Email is essential.',
                        isEmail: 'Please enter a valid email format (e.g., name@example.com).'
                    }
                },
                subject: {
                    required: true,
                    minLength: 5,
                    maxLength: 100,
                    errorMessage: {
                        required: 'A subject is needed.',
                        minLength: 'Subject should be at least 5 characters.',
                        maxLength: 'Subject cannot be longer than 100 characters.'
                    }
                },
                message: {
                    required: true,
                    minLength: 10,
                    maxLength: 2000,
                    errorMessage: {
                        required: 'Your message is required.',
                        minLength: 'Please provide a message of at least 10 characters.',
                        maxLength: 'Message cannot exceed 2000 characters.'
                    }
                }
            };

            /**
             * Checks if an email is valid.
             * @param {string} email - The email string to validate.
             * @returns {boolean} - True if valid, false otherwise.
             */
            function isValidEmailFormat(email) {
                const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
                return emailRegex.test(email);
            }

            /**
             * Validates a single input field against its rules.
             * @param {HTMLInputElement|HTMLTextAreaElement} inputElement - The input element to validate.
             * @param {object} rules - The validation rules for the input.
             * @returns {string[]} - An array of error messages.
             */
            function getFieldErrors(inputElement, rules) {
                const value = inputElement.value.trim();
                const errors = [];

                if (rules.required && value === '') {
                    errors.push(rules.errorMessage.required);
                } else if (value !== '') {
                    if (rules.minLength && value.length < rules.minLength) {
                        errors.push(rules.errorMessage.minLength);
                    }
                    if (rules.maxLength && value.length > rules.maxLength) {
                        errors.push(rules.errorMessage.maxLength);
                    }
                    if (rules.isEmail && !isValidEmailFormat(value)) {
                        errors.push(rules.errorMessage.isEmail);
                    }
                    // Add more custom validations here
                }
                return errors;
            }

            /**
             * Updates the UI for an input field based on validation errors.
             * @param {HTMLInputElement|HTMLTextAreaElement} inputElement - The input element.
             * @param {string[]} errors - Array of error messages.
             */
            function updateInputUI(inputElement, errors) {
                const parentGroup = inputElement.closest('.form-group');
                if (!parentGroup) {
                    log(`Error: Could not find parent '.form-group' for input ${inputElement.id}`, 'error');
                    return;
                }
                const messageContainer = parentGroup.querySelector('.message-container');
                const rules = validationRules[inputElement.id];

                if (!messageContainer) {
                    log(`Error: Could not find '.message-container' within parent of ${inputElement.id}`, 'error');
                    return;
                }

                if (errors.length > 0) {
                    messageContainer.textContent = errors[0];
                    messageContainer.classList.add('error');
                    messageContainer.classList.remove('success');
                    inputElement.classList.add('is-invalid');
                    inputElement.classList.remove('is-valid');
                    log(`Validation failed for ${inputElement.id}: ${errors[0]}`);
                } else {
                    if (inputElement.value.trim() !== '' && rules.required) {
                        // Field is filled and required, show success state
                        messageContainer.textContent = '✓'; // Simple checkmark for success
                        messageContainer.classList.add('success');
                        messageContainer.classList.remove('error');
                        inputElement.classList.add('is-valid');
                        inputElement.classList.remove('is-invalid');
                        log(`Validation successful for ${inputElement.id}`);
                    } else {
                        // Clear messages and classes if field is empty or not required
                        messageContainer.textContent = '';
                        messageContainer.classList.remove('error', 'success');
                        inputElement.classList.remove('is-invalid', 'is-valid');
                    }
                }
            }

            /**
             * Validates the entire form and returns a boolean indicating validity.
             * Also updates UI for all fields.
             * @returns {boolean} - True if the form is valid, false otherwise.
             */
            function validateForm() {
                log('Starting form validation...');
                let isFormValid = true;
                const allInputs = form.querySelectorAll('input, textarea');

                // Reset all messages and classes first
                allInputs.forEach(input => {
                    const parentGroup = input.closest('.form-group');
                    if (parentGroup) {
                        const messageContainer = parentGroup.querySelector('.message-container');
                        if (messageContainer) {
                            messageContainer.textContent = '';
                            messageContainer.classList.remove('error', 'success');
                        }
                        input.classList.remove('is-invalid', 'is-valid');
                    }
                });

                // Validate each input and update UI
                allInputs.forEach(input => {
                    const rules = validationRules[input.id];
                    if (!rules) {
                        log(`Warning: No validation rules defined for input ID: ${input.id}`, 'warn');
                        return; // Skip if no rules defined
                    }

                    const errors = getFieldErrors(input, rules);
                    updateInputUI(input, errors); // This updates the UI and shows errors if any

                    if (errors.length > 0) {
                        isFormValid = false;
                        log(`Form is invalid due to ${input.id}.`);
                    }
                });
                log(`Form validation complete. Is valid: ${isFormValid}`);
                return isFormValid;
            }

            // --- Event Listeners Setup ---
            const formInputs = form.querySelectorAll('input, textarea');
            formInputs.forEach(input => {
                const rules = validationRules[input.id];
                if (!rules) {
                    log(`Warning: Input '${input.id}' has no validation rules defined.`, 'warn');
                    return; // Skip inputs without rules
                }

                // 'input' event: fires immediately when value changes
                input.addEventListener('input', () => {
                    log(`Input event on ${input.id}`);
                    const errors = getFieldErrors(input, rules);
                    updateInputUI(input, errors);
                });

                // 'blur' event: fires when the element loses focus
                input.addEventListener('blur', () => {
                    log(`Blur event on ${input.id}`);
                    const errors = getFieldErrors(input, rules);
                    updateInputUI(input, errors);
                });
            });

            // Handle Form Submission
            form.addEventListener('submit', function(event) {
                log('Submit event triggered.');
                event.preventDefault(); // Stop default submission

                const isFormValid = validateForm();

                if (isFormValid) {
                    log('Form is valid. Simulating AJAX submission...');
                    const formData = new FormData(form);
                    const dataToSend = Object.fromEntries(formData.entries());
                    log('Data to send:', dataToSend);

                    // Simulate network delay
                    // In a real app, you would use fetch() here.
                    // Example:
                    // fetch('/your-api-endpoint', {
                    //     method: 'POST',
                    //     body: JSON.stringify(dataToSend),
                    //     headers: { 'Content-Type': 'application/json' }
                    // })
                    // .then(response => response.json())
                    // .then(result => { log('API Success:', result); /* handle success */ })
                    // .catch(error => { log('API Error:', error); /* handle error */ });

                    setTimeout(() => {
                        log('Simulated submission complete.');
                        form.reset(); // Clear form fields

                        // Reset UI states after form reset
                        formInputs.forEach(input => {
                            const parentGroup = input.closest('.form-group');
                            if (parentGroup) {
                                const messageContainer = parentGroup.querySelector('.message-container');
                                if (messageContainer) {
                                    messageContainer.textContent = '';
                                    messageContainer.classList.remove('error', 'success');
                                }
                                input.classList.remove('is-invalid', 'is-valid');
                            }
                        });

                        if (successOverlay) {
                            successOverlay.classList.add('show');
                            log('Success overlay displayed.');

                            // Auto-hide success overlay
                            setTimeout(() => {
                                successOverlay.classList.remove('show');
                                log('Success overlay hidden.');
                            }, 4500); // Show for 4.5 seconds
                        } else {
                            log('Success overlay element not found, cannot display success message.', 'warn');
                        }
                    }, 1800); // Simulate 1.8 second network latency
                } else {
                    log('Form submission prevented: Form is invalid.');
                }
            });

            // Initial validation check on page load if fields are pre-filled
            log('Performing initial validation check for pre-filled fields.');
            formInputs.forEach(input => {
                const rules = validationRules[input.id];
                if (input.value.trim() !== '' && rules) {
                    const errors = getFieldErrors(input, rules);
                    updateInputUI(input, errors);
                }
            });
        });
    </script>

</body>
</html>
