<!DOCTYPE html>
<html>
<head>
  <title>Mini GitHub Copilot</title>

  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      font-family: Consolas, monospace;
      color: #d4d4d4;
    }

    .editor-container {
      position: relative;
      height: 100vh;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      color: #d4d4d4;
      border: none;
      outline: none;
      font-size: 16px;
      line-height: 1.5;
      resize: none;
      z-index: 2;
      position: relative;
    }

    .ghost-text {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.5;
      z-index: 1;
    }

    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #333;
      padding: 10px;
      font-size: 14px;
    }

    .toolbar span {
      margin-right: 15px;
      color: #ccc;
    }

    .status {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #007acc;
      padding: 5px 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="toolbar">
  <span>Mini Copilot</span>
  <span>JavaScript</span>
  <span>UTF-8</span>
</div>

<div class="editor-container">
  <div id="ghost" class="ghost-text"></div>
  <textarea id="editor" placeholder="Start typing..."></textarea>
</div>

<div class="status">
  Copilot: Ready
</div>

<script>
const editor = document.getElementById("editor");
const ghost = document.getElementById("ghost");

// fake suggestion logic (replace with API later)
function getSuggestion(code) {
  if (code.includes("function add")) {
    return " {\n  return a + b;\n}";
  }
  if (code.includes("for (")) {
    return "let i = 0; i < 10; i++) {\n\n}";
  }
  return "";
}

editor.addEventListener("input", () => {
  const code = editor.value;
  const suggestion = getSuggestion(code);

  ghost.innerText = code + suggestion;
});

// Accept suggestion with TAB
editor.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    e.preventDefault();

    const code = editor.value;
    const suggestion = getSuggestion(code);

    editor.value = code + suggestion;
    ghost.innerText = editor.value;
  }
});
</script>

</body>
</html>
